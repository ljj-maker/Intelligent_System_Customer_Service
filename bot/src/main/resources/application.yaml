server:
  port: 18083
spring:
  application:
    name: bot # 微服务名称
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${icss.db.host}:3306/${icss.db.name}?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${icss.db.username}
    password: ${icss.db.pw}
  cloud:
    nacos:
      server-addr: ${icss.cloud.addr}
  redis:
    host: ${icss.redis.host}
    port: ${icss.redis.port}
    password: ${icss.redis.pw}
  rabbitmq:
    host: ${icss.rabbitmq.host}
    port: ${icss.rabbitmq.port}
    virtual-host: /icss
    username: ${icss.rabbitmq.username}
    password: ${icss.rabbitmq.pw}
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
logging:
  level:
    com.kefu: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"
knife4j:
  enable: true
  openapi:
    title: 机器人对话接口文档
    description: "机器人对话接口文档"
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.kefu.bot.controller

kefu:
  jwt:
    location: classpath:kefu.jks
    alias: kefu
    password: kefu123
    tokenTTL: 60m
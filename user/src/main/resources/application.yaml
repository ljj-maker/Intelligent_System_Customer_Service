server:
  port: 8082
spring:
  application:
    name: user # 微服务名称
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${icss.db.host}:3306/${icss.db.name}?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${icss.db.pw}
  cloud:
    nacos:
      server-addr: ${icss.cloud.addr}
      discovery:
        enabled: false
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
logging:
  level:
    com.kefu: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"
knife4j:
  enable: true
  openapi:
    title: 客服系统用户接口文档
    description: "客服系统用户接口文档"
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.kefu.user.controller
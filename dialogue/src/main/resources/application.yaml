server:
  port: 18085
spring:
  application:
    name: dialogue # 微服务名称
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${icss.db.host}:3306/${icss.db.name}?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${icss.db.username}
    password: ${icss.db.pw}
  cloud:
    nacos:
      server-addr: ${icss.cloud.addr}
  redis:
    host: ${icss.redis.host}
    port: ${icss.redis.port}
    password: ${icss.redis.pw}
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      logic-delete-field: isDeleted    # 全局逻辑删除字段名
      logic-delete-value: 1            # 删除标记值
      logic-not-delete-value: 0        # 未删除标记值
      update-strategy: not_null
      id-type: auto
logging:
  level:
    com.kefu: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"
knife4j:
  enable: true
  openapi:
    title: 客服系统对话接口文档
    description: "客服系统对话接口文档"
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.kefu.dialogue.controller

kefu:
  jwt:
    location: classpath:kefu.jks
    alias: kefu
    password: kefu123
    tokenTTL: 60m